<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Health Tracker — Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="ds/colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; }
  * { box-sizing: border-box; }
  @keyframes sheetIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* Hide scrollbars in device frames */
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-train.jsx"></script>
<script type="text/babel" src="screens-library.jsx"></script>
<script type="text/babel" src="screens-progress.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  function Root() {
    return (
      <React.Fragment>
        <App/>
        <HealthTracker_Tweaks/>
      </React.Fragment>
    );
  }

  function HealthTracker_Tweaks() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <TweaksPanel title="Tweaks">
        <TweakSection label="Apariencia">
          <TweakRadio label="Tema" value={t.dark ? 'dark' : 'light'}
            onChange={(v) => setTweak('dark', v === 'dark')}
            options={[
              { value: 'light', label: 'Claro' },
              { value: 'dark',  label: 'Oscuro' },
            ]}/>
          <TweakColor label="Acento" value={t.accent}
            onChange={(v) => setTweak('accent', v)}
            options={ACCENT_OPTIONS}/>
          <TweakRadio label="Densidad" value={t.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact', label: 'Compacta' },
              { value: 'comfortable', label: 'Cómoda' },
            ]}/>
        </TweakSection>
        <TweakSection label="Contenido">
          <TweakToggle label="Datos poblados" value={t.populated} onChange={(v) => setTweak('populated', v)}/>
          <TweakToggle label="Comentarios de diseño" value={t.commentary} onChange={(v) => setTweak('commentary', v)}/>
        </TweakSection>
        <TweakSection label="Entrenamiento">
          <TweakSelect label="Patrón de registro" value={t.logPattern} onChange={(v) => setTweak('logPattern', v)}
            options={[
              { value: 'cards', label: 'Cards (grande)' },
              { value: 'list',  label: 'Lista (compacto)' },
              { value: 'focus', label: 'Focus (un set)' },
            ]}/>
        </TweakSection>
      </TweaksPanel>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Root/>);
</script>
</body>
</html>
